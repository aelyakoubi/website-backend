# ────────────────────────────────
# Authentication Flow
# ────────────────────────────────

Frontend
→ Auth0 Login (Google/GitHub/Microsoft)
→ POST /auth/oauth-sync
→ Backend validates/syncs user
→ Backend generates custom JWT
→ Protected API routes use backend JWT middleware


# ────────────────────────────────
# Environment Variables (.env)
# ────────────────────────────────

Required:

PORT=
DATABASE_URL=
AUTH_SECRET_KEY=

AUTH0_DOMAIN=

EMAIL_USER=
EMAIL_PASS=

SENTRY_DSN=


# ────────────────────────────────
# Notes
# ────────────────────────────────

- Backend is the central authentication authority.
- Auth0 is used only as identity provider/social login provider.
- JWT authorization is handled by custom backend middleware.
- Prisma Client is generated using:
  npm run build
- Production secrets should never be committed to Git.
